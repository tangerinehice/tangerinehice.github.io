<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro - Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApJ8MJ4NTDt5CDqDsVRUSv5_urt2TbtFI",
            authDomain: "mypomo-e2622.firebaseapp.com",
            projectId: "mypomo-e2622",
            storageBucket: "mypomo-e2622.appspot.com",
            messagingSenderId: "1082968451105",
            appId: "1:1082968451105:web:5f4dd2bd38213d1bd21b60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userId = null;

        async function init() {
            try {
                console.log("🔵 Step 1: Signing in anonymously...");
                const result = await signInAnonymously(auth);
                userId = result.user.uid;
                console.log("✅ Signed in as:", userId);
                
                document.getElementById('status').innerHTML = `✅ Signed in as: ${userId}`;
                
                // Try to save a test session
                console.log("🔵 Step 2: Attempting to save test session...");
                await testSaveSession();
                
                // Try to load sessions
                console.log("🔵 Step 3: Attempting to load sessions...");
                await testLoadSessions();
                
            } catch (error) {
                console.error("❌ ERROR:", error);
                document.getElementById('status').innerHTML = `❌ ERROR: ${error.message}`;
            }
        }

        async function testSaveSession() {
            try {
                const docRef = await addDoc(collection(db, 'sessions'), {
                    userId: userId,
                    label: 'Test Session',
                    category: 'work',
                    durationMinutes: 25,
                    completedAt: new Date()
                });
                console.log("✅ Session saved with ID:", docRef.id);
                document.getElementById('status').innerHTML += `<br>✅ Session saved: ${docRef.id}`;
            } catch (error) {
                console.error("❌ Save error:", error);
                document.getElementById('status').innerHTML += `<br>❌ Save error: ${error.message}`;
            }
        }

        async function testLoadSessions() {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const q = query(
                    collection(db, 'sessions'),
                    where('userId', '==', userId),
                    where('completedAt', '>=', today),
                    orderBy('completedAt', 'desc')
                );

                const snapshot = await getDocs(q);
                console.log("✅ Loaded sessions:", snapshot.size);
                document.getElementById('status').innerHTML += `<br>✅ Sessions loaded: ${snapshot.size}`;
                
                snapshot.forEach(doc => {
                    console.log("  - ", doc.data());
                });
            } catch (error) {
                console.error("❌ Load error:", error);
                document.getElementById('status').innerHTML += `<br>❌ Load error: ${error.message}`;
            }
        }

        window.addEventListener('load', init);
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        #status {
            background: white;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>🍅 Firebase Debug Test</h1>
    <div id="status">Loading...</div>
</body>
</html>
