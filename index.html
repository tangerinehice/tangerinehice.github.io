<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🍅</text></svg>">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- Firebase SDK v9+ (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, where, orderBy, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyApJ8MJ4NTDt5CDqDsVRUSv5_urt2TbtFI",
            authDomain: "mypomo-e2622.firebaseapp.com",
            projectId: "mypomo-e2622",
            storageBucket: "mypomo-e2622.appspot.com",
            messagingSenderId: "1082968451105",
            appId: "1:1082968451105:web:5f4dd2bd38213d1bd21b60"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Configuration
        const WORK_DURATION = 25;
        const BREAK_DURATION = 5;

        let state = {
            isRunning: false,
            timeRemaining: WORK_DURATION * 60,
            isWorkSession: true,
            firebaseReady: false,
            userId: null,
            timerInterval: null,
            sessionStartTime: null,
            sessionPausedTime: 0
        };

        let chartInstance = null;

        // Initialize Firebase Auth with Shared User ID
        async function initializeFirebase() {
            try {
                // Get or create a shared user ID (stored locally)
                let sharedUserId = localStorage.getItem('pomodoroUserId');
                if (!sharedUserId) {
                    sharedUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('pomodoroUserId', sharedUserId);
                }
                state.userId = sharedUserId;
                state.firebaseReady = true;
                document.getElementById('syncStatus').textContent = '✓ Synced';
                document.getElementById('syncStatus').className = 'sync-status connected';
                await loadTodaySessions();
                await loadAllSessions();
                setupRealtimeListener();
            } catch (error) {
                console.error('Firebase error:', error);
                document.getElementById('syncStatus').textContent = '✗ Offline';
            }
        }

        // Timer Functions - Fixed to track actual elapsed time
        function updateTimerDisplay() {
            const minutes = Math.floor(state.timeRemaining / 60);
            const seconds = state.timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startTimer() {
            if (state.isRunning) return;
            
            state.isRunning = true;
            state.sessionStartTime = Date.now() - (state.sessionPausedTime * 1000);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            document.body.classList.add('focusing');

            state.timerInterval = setInterval(() => {
                const elapsedSeconds = Math.floor((Date.now() - state.sessionStartTime) / 1000);
                const sessionDuration = state.isWorkSession ? WORK_DURATION * 60 : BREAK_DURATION * 60;
                state.timeRemaining = Math.max(0, sessionDuration - elapsedSeconds);
                
                updateTimerDisplay();

                if (state.timeRemaining <= 0) {
                    completeSession();
                }
            }, 100); // Update more frequently for accuracy
        }

        function pauseTimer() {
            state.isRunning = false;
            clearInterval(state.timerInterval);
            const elapsedSeconds = Math.floor((Date.now() - state.sessionStartTime) / 1000);
            state.sessionPausedTime = elapsedSeconds;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
            document.body.classList.remove('focusing');
        }

        function resetTimer() {
            pauseTimer();
            state.isWorkSession = true;
            state.timeRemaining = WORK_DURATION * 60;
            state.sessionStartTime = null;
            state.sessionPausedTime = 0;
            updateTimerDisplay();
            document.getElementById('sessionType').textContent = 'Work Session';
        }

        async function completeSession() {
            pauseTimer();
            
            const label = document.getElementById('sessionLabel').value || 'Untitled';
            const category = document.getElementById('sessionCategory').value;
            const duration = state.isWorkSession ? WORK_DURATION : BREAK_DURATION;

            await saveSession(label, category, duration);

            showNotification(`✓ ${duration} min session completed!`);

            // Switch to break
            state.isWorkSession = !state.isWorkSession;
            state.timeRemaining = state.isWorkSession ? WORK_DURATION * 60 : BREAK_DURATION * 60;
            state.sessionStartTime = null;
            state.sessionPausedTime = 0;
            document.getElementById('sessionType').textContent = 
                state.isWorkSession ? 'Work Session' : 'Break Time';
            
            updateTimerDisplay();
            document.getElementById('sessionLabel').value = '';
        }

        async function saveSession(label, category, duration) {
            if (!state.firebaseReady) return;
            try {
                await addDoc(collection(db, 'sessions'), {
                    userId: state.userId,
                    label: label,
                    category: category,
                    durationMinutes: duration,
                    completedAt: new Date()
                });
                await loadTodaySessions();
                await loadAllSessions();
            } catch (error) {
                console.error('Error saving session:', error);
            }
        }

        async function loadTodaySessions() {
            if (!state.firebaseReady) return;
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const q = query(
                    collection(db, 'sessions'),
                    where('userId', '==', state.userId),
                    where('completedAt', '>=', today),
                    orderBy('completedAt', 'desc')
                );

                const snapshot = await getDocs(q);
                const sessions = [];
                snapshot.forEach(doc => {
                    sessions.push({ id: doc.id, ...doc.data() });
                });

                displaySessions(sessions);
                updateStats(sessions);
                return sessions;
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        async function loadAllSessions() {
            if (!state.firebaseReady) return;
            try {
                const last30Days = new Date();
                last30Days.setDate(last30Days.getDate() - 30);
                
                const q = query(
                    collection(db, 'sessions'),
                    where('userId', '==', state.userId),
                    where('completedAt', '>=', last30Days),
                    orderBy('completedAt', 'desc')
                );

                const snapshot = await getDocs(q);
                const sessions = [];
                snapshot.forEach(doc => {
                    sessions.push({ id: doc.id, ...doc.data() });
                });

                updateCharts(sessions);
                return sessions;
            } catch (error) {
                console.error('Error loading all sessions:', error);
            }
        }

        function displaySessions(sessions) {
            const container = document.getElementById('historyList');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div class="history-empty">No sessions yet</div>';
                return;
            }

            container.innerHTML = sessions.map(session => {
                const time = session.completedAt.toDate().toLocaleTimeString();
                return `
                    <div class="history-item">
                        <div class="history-item-info">
                            <div class="history-item-label">${session.label}</div>
                            <div class="history-item-time">${time}</div>
                        </div>
                        <div class="history-item-duration">${session.durationMinutes}m</div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(sessions) {
            const totalSessions = sessions.length;
            const totalMinutes = sessions.reduce((sum, s) => sum + s.durationMinutes, 0);
            
            const categoryCount = {};
            sessions.forEach(s => {
                categoryCount[s.category] = (categoryCount[s.category] || 0) + 1;
            });
            
            const topCategory = Object.keys(categoryCount).length > 0
                ? Object.keys(categoryCount).reduce((a, b) => 
                    categoryCount[a] > categoryCount[b] ? a : b)
                : '—';

            document.getElementById('totalSessions').textContent = totalSessions;
            document.getElementById('totalMinutes').textContent = totalMinutes;
            document.getElementById('topCategory').textContent = topCategory.toUpperCase();
        }

        function updateCharts(sessions) {
            // Category Pie Chart
            const categoryCount = {};
            sessions.forEach(s => {
                categoryCount[s.category] = (categoryCount[s.category] || 0) + s.durationMinutes;
            });

            const categoryCtx = document.getElementById('categoryChart');
            if (categoryCtx) {
                if (chartInstance) {
                    chartInstance.destroy();
                }
                chartInstance = new Chart(categoryCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(categoryCount),
                        datasets: [{
                            data: Object.values(categoryCount),
                            backgroundColor: [
                                '#a99878',
                                '#8b7355',
                                '#c4b5a0',
                                '#9a8968',
                                '#b8a890'
                            ],
                            borderColor: '#ffffff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#8b7355',
                                    font: { size: 12 },
                                    padding: 15
                                }
                            }
                        }
                    }
                });
            }

            // Weekly Comparison
            const weeklyData = getWeeklyData(sessions);
            updateWeeklyChart(weeklyData);

            // Monthly Comparison
            const monthlyData = getMonthlyData(sessions);
            updateMonthlyChart(monthlyData);
        }

        function getWeeklyData(sessions) {
            const data = {};
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'short' });
                data[dateStr] = 0;
            }

            sessions.forEach(s => {
                const sessionDate = s.completedAt.toDate();
                const dateStr = sessionDate.toLocaleDateString('en-US', { weekday: 'short' });
                if (data.hasOwnProperty(dateStr)) {
                    data[dateStr] += s.durationMinutes;
                }
            });

            return data;
        }

        function updateWeeklyChart(data) {
            const ctx = document.getElementById('weeklyChart');
            if (ctx && window.weeklyChart) {
                window.weeklyChart.destroy();
            }
            if (ctx) {
                window.weeklyChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data),
                        datasets: [{
                            label: 'Minutes',
                            data: Object.values(data),
                            backgroundColor: '#a99878',
                            borderColor: '#8b7355',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { color: '#8b7355' } },
                            x: { ticks: { color: '#8b7355' } }
                        },
                        plugins: {
                            legend: { labels: { color: '#8b7355' } }
                        }
                    }
                });
            }
        }

        function getMonthlyData(sessions) {
            const data = {};
            const today = new Date();
            
            for (let i = 29; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                data[dateStr] = 0;
            }

            sessions.forEach(s => {
                const sessionDate = s.completedAt.toDate();
                const dateStr = sessionDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                if (data.hasOwnProperty(dateStr)) {
                    data[dateStr] += s.durationMinutes;
                }
            });

            return data;
        }

        function updateMonthlyChart(data) {
            const ctx = document.getElementById('monthlyChart');
            if (ctx && window.monthlyChart) {
                window.monthlyChart.destroy();
            }
            if (ctx) {
                window.monthlyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Object.keys(data),
                        datasets: [{
                            label: 'Minutes',
                            data: Object.values(data),
                            borderColor: '#a99878',
                            backgroundColor: 'rgba(169, 152, 120, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { color: '#8b7355' } },
                            x: { ticks: { color: '#8b7355' } }
                        },
                        plugins: {
                            legend: { labels: { color: '#8b7355' } }
                        }
                    }
                });
            }
        }

        function setupRealtimeListener() {
            if (!state.firebaseReady) return;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const q = query(
                collection(db, 'sessions'),
                where('userId', '==', state.userId),
                where('completedAt', '>=', today)
            );

            onSnapshot(q, (snapshot) => {
                loadTodaySessions();
                loadAllSessions();
            });
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);

        // Tab Navigation
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                e.target.classList.add('active');
                const tabId = e.target.dataset.tab;
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Initialize
        initializeFirebase();
        updateTimerDisplay();
    </script>

    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

        .timer-display {

        .timer-label {

        .button-group {

        .btn-primary {

        }

        .chart-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b7355;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-size: 13px;
            font-weight: 600;
            color: #8b7355;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1.2px;

            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;

        }

        .history-item {
            background: rgba(169, 152, 120, 0.04);
            padding: 13px;

            border-left: 3px solid #a99878;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;

        }

        .history-item:hover {

        }

        .history-item-label {
            font-weight: 600;
            color: #8b7355;

        }

        .history-item-time {
            color: #999;
            font-size: 11px;
        }

        .history-item-duration {
            font-weight: 600;
            color: #a99878;
            margin-left: 10px;
        }

        .history-empty {
            text-align: center;
            color: #b8b8b8;
            padding: 20px;
            font-size: 14px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #a99878 0%, #9a8968 100%);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(169, 152, 120, 0.25);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            .timer-display {
                font-size: 56px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .chart-container {
                height: 250px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 18px;
            }
            .timer-display {
                font-size: 48px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .notification {
                right: 10px;
                left: 10px;
                top: auto;
                bottom: 20px;
            }
            .chart-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 Focus Tracker</h1>
        <div class="sync-status" id="syncStatus">Connecting...</div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="timer">Timer</button>
            <button class="tab-btn" data-tab="today">Today</button>
            <button class="tab-btn" data-tab="analytics">Analytics</button>
        </div>

        <div id="timer" class="tab-content active">
            <div class="timer-section">
                <div class="timer-label" id="sessionType">Work Session</div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="input-section">
                    <input 
                        type="text" 
                        id="sessionLabel" 
                        placeholder="What are you focusing on?"
                        maxlength="50"
                    >
                    <select id="sessionCategory">
                        <option value="work">Work</option>
                        <option value="pm">PM</option>
                        <option value="tech">Tech</option>
                        <option value="reader">Reader</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="startBtn">Start Session</button>
                    <button class="btn-secondary" id="pauseBtn" style="display: none;">Pause</button>
                    <button class="btn-secondary" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
		
        <div id="today" class="tab-content">
            <div class="history-section">
                <div class="history-title">Today's Sessions</div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">No sessions yet</div>
                </div>
            </div>
        </div>
		
        <div id="analytics" class="tab-content">
            <div class="stats-section">
                <div class="stats-title">Today's Stats</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalSessions">0</div>
                        <div class="stat-label">Sessions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalMinutes">0</div>
                        <div class="stat-label">Minutes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="topCategory">—</div>
                        <div class="stat-label">Top</div>
                    </div>
                </div>
            </div>

            <div class="stats-section">
                <div class="chart-title">Category Breakdown</div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="stats-section">
                <div class="chart-title">Weekly Comparison</div>
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <div class="stats-section">
                <div class="chart-title">Monthly Trend</div>
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
